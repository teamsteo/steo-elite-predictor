name: ML Pipeline

on:
  schedule:
    # Jitter intégré: décalage aléatoire de 0-5 min pour éviter les patterns
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      sport:
        description: 'Sport spécifique (laisser vide pour tous)'
        required: false
        default: ''
      dry_run:
        description: "Dry run (pas d'export Supabase)"
        required: false
        type: boolean
        default: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Run ML Training
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Jitter: délai aléatoire 0-60s pour éviter les patterns temporels
          DELAY=$(python3 -c "import random; print(random.randint(0,60))")
          sleep $DELAY
          ARGS="--no-telegram"
          if [ -n "${{ github.event.inputs.sport }}" ]; then
            ARGS="$ARGS --sport ${{ github.event.inputs.sport }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python ml/train_xgboost.py $ARGS

      - name: Trigger Telegram Bilan (backup)
        if: success()
        run: |
          # Backup: envoyer le bilan journalier sur Telegram
          # Sécurise même si le cron Vercel 5:30 échoue
          sleep 30
          echo "📊 Envoi du bilan journalier Telegram (backup)..."
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
          CRON_SECRET="${{ secrets.CRON_SECRET }}"
          CRON_SECRET="${CRON_SECRET:-secretsteo-elitecron2026}"
          RESPONSE=$(curl -s -m 120 \
            "https://my-project-zeta-five-85.vercel.app/api/cron?secret=${CRON_SECRET}&action=telegram-results&date=${YESTERDAY}")
          echo "Bilan response: $RESPONSE"

      - name: Upload training results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-training-${{ github.run_number }}
          path: ml/last_training_result.json
          retention-days: 30
