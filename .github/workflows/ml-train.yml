name: ML Training — XGBoost

on:
  schedule:
    # Chaque lundi à 05:00 UTC (après le week-end de matchs)
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      sport:
        description: 'Sport (all, football, basketball, tennis, hockey, baseball)'
        required: false
        default: 'all'
      days:
        description: 'Nombre de jours de données'
        required: false
        default: '365'

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd scripts/ml-train
          pip install -r requirements.txt

      - name: Run ML Training
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd scripts/ml-train
          SPORT="${{ github.event.inputs.sport || 'all' }}"
          DAYS="${{ github.event.inputs.days || '365' }}"

          if [ "$SPORT" = "all" ]; then
            python train.py --all-sports --days "$DAYS"
          else
            python train.py --sport "$SPORT" --days "$DAYS"
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ml-training-results
          path: scripts/ml-train/data/
          retention-days: 30
